<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#3b1f6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8ecfff"/>
      <stop offset="100%" stop-color="#b794f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>

  <!-- Markdown-style M, large and centered -->
  <g fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="28,88 28,36 64,66 100,36 100,88"/>
  </g>

  <!-- Down arrow -->
  <g fill="none" stroke="#8ecfff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="64" y1="92" x2="64" y2="110"/>
    <polyline points="53,101 64,112 75,101"/>
  </g>
</svg>
